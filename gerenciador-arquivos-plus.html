<!DOCTYPE html>
<html lang="pt-BR">
<head><style>
@font-face {
  font-family: "Optimistic";
  font-style: normal;
  font-weight: 400 600;
  font-display: swap;
  src: url("/fonts/OptimisticAI_VF_Optimized.woff2") format("woff2");
}
@font-face {
  font-family: "Optimistic Mono";
  font-style: normal;
  font-weight: 400;
  font-display: swap;
  src: url("/fonts/OptimisticMono_W_TextRegular.woff2") format("woff2");
}
:where(html) {
  font-family: "Optimistic", system-ui, sans-serif;
}
:where(code, pre, kbd, samp) {
  font-family: "Optimistic Mono", ui-monospace, monospace;
}
</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerenciador de arquivos +</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiR2VyZW5jaWFkb3IgZGUgYXJxdWl2b3MgKyIsInNob3J0X25hbWUiOiJBcnF1aXZvcysiLCJzdGFydF91cmwiOiIuLyIsImRpc3BsYXkiOiJzdGFuZGFsb25lIn0=">
<style>
:root{--bg:#f5f5f5;--card:#fff;--primary:#000;--text:#333}
*{box-sizing:border-box;font-family:Roboto,Arial,sans-serif}
body{margin:0;background:var(--bg);color:var(--text)}
header{background:#1a1a1a;color:#fff;display:flex;align-items:center;padding:12px 16px;gap:12px;position:sticky;top:0;z-index:10}
header h1{font-size:18px;margin:0;flex:1;font-weight:500}
.icon-btn{background:none;border:none;color:#fff;font-size:24px}
.search{padding:12px 16px}
.search input{width:100%;padding:14px 16px 14px 44px;border:none;border-radius:16px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.1);font-size:15px}
.search{position:relative}
.search::before{content:"🔍";position:absolute;left:32px;top:26px;opacity:.5}
.storages{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px}
.storage{background:var(--card);border-radius:16px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.08);cursor:pointer}
.storage-top{display:flex;gap:10px;align-items:center}
.storage-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px}
.int-icon{background:#e0e0e0}
.sd-icon{background:#1a1a2e;color:#fff}
.storage h3{margin:0;font-size:15px}
.storage p{margin:2px 0 0;font-size:12px;color:#777}
.progress{height:4px;background:#eee;border-radius:2px;margin-top:12px;overflow:hidden}
.progress>div{height:100%;width:0%;background:#4caf50;transition:.3s}
h2.section{font-size:13px;color:#888;margin:20px 16px 8px;text-transform:uppercase;letter-spacing:.5px}
.categories{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:0 16px 80px}
.cat{background:var(--card);border-radius:16px;padding:12px 8px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.08);cursor:pointer}
.cat-icon{width:48px;height:48px;margin:0 auto 8px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff}
.cat b{display:block;font-size:13px;font-weight:500}
.cat span{font-size:11px;color:#888}
.cat.active{outline:2px solid #1e88e5}
footer{position:fixed;bottom:0;left:0;right:0;background:#1e293b;color:#fff;display:flex}
footer button{flex:1;background:none;border:none;color:#aaa;padding:14px;font-size:14px}
.list-view{position:fixed;inset:0;background:#fff;z-index:20;display:flex;flex-direction:column}
.list-header{background:#1a1a1a;color:#fff;display:flex;align-items:center;padding:12px;gap:12px}
.list-header h2{flex:1;margin:0;font-size:18px}
.breadcrumb{display:flex;align-items:center;gap:8px;padding:10px 16px;background:#fff;border-bottom:1px solid #eee}
.usage{margin-left:auto;background:#fff;border:1px solid #ccc;border-radius:6px;padding:4px 8px;font-size:12px;display:flex;align-items:center;gap:6px}
.folder-list{flex:1;overflow:auto}
.folder{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #f0f0f0}
.folder-icon{width:40px;height:40px;margin-right:12px;font-size:28px}
.folder-info{flex:1}
.folder-info b{display:block;font-size:15px}
.folder-info small{color:#777;font-size:12px}
.folder-date{color:#777;font-size:12px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:30;padding:20px}
.modal-box{background:#222;color:#fff;border-radius:12px;padding:20px;max-width:360px;width:100%}
.modal-box h3{margin-top:0}
.btn-blue{color:#4da3ff;background:none;border:none;font-size:14px;float:right;margin-top:10px}
</style>
</head>
<body>
<header>
  <button class="icon-btn">☰</button>
  <h1>Gerenciador de arquivos +</h1>
  <span style="font-size:22px">👑</span>
  <button class="icon-btn">⋮</button>
</header>

<div id="home">
  <div class="search"><input id="search" placeholder="Pesquisar arquivos..."></div>
  
  <div class="storages">
    <div class="storage" id="internal">
      <div class="storage-top">
        <div class="storage-icon int-icon">🗄️</div>
        <div><h3>Armaz. interno</h3><p id="int-sub">Toque para indexar</p></div>
      </div>
      <div class="progress"><div id="int-bar"></div></div>
    </div>
    <div class="storage" id="sd">
      <div class="storage-top">
        <div class="storage-icon sd-icon">💾</div>
        <div><h3>Cartão SD</h3><p id="sd-sub">Toque para indexar</p></div>
      </div>
      <div class="progress"><div id="sd-bar"></div></div>
    </div>
  </div>

  <h2 class="section">Categorias</h2>
  <div class="categories" id="cats"></div>
</div>

<div class="list-view" id="listView" style="display:none">
  <div class="list-header">
    <button class="icon-btn" onclick="closeList()">☰</button>
    <h2 id="listTitle">Cartão SD</h2>
    <button class="icon-btn">🔍</button>
    <button class="icon-btn">⇅</button>
    <button class="icon-btn" onclick="toggleMenu()">⋮</button>
  </div>
  <div class="breadcrumb">
    <span style="font-size:22px">🏠</span> › <span style="font-size:20px">💾</span>
    <div class="usage" id="usageBox">● 0% EM USO</div>
  </div>
  <div class="folder-list" id="folderList"></div>
  
  <!-- Menu Novo -->
  <div id="mainMenu" style="display:none;position:absolute;right:12px;top:52px;background:#2b2b2b;color:#fff;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.4);z-index:40;min-width:180px;overflow:hidden">
    <div class="menu-item" onclick="openNewMenu()" style="padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer"><span style="font-size:20px">+</span> Novo <span style="margin-left:auto">▶</span></div>
    <div class="menu-item" onclick="analyzeStorage()" style="padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer"><span>◔</span> Analisar</div>
    <div class="menu-item" onclick="refreshCurrent()" style="padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer"><span>↻</span> Atualizar</div>
  </div>
  <div id="newMenu" style="display:none;position:absolute;right:200px;top:52px;background:#2b2b2b;color:#fff;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.4);z-index:41;min-width:160px;overflow:hidden">
    <div style="padding:10px 16px;color:#aaa;font-size:13px">Novo</div>
    <div class="menu-item" onclick="createFilePrompt()" style="padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer"><span>📄</span> Arquivo</div>
    <div class="menu-item" onclick="createFolderPrompt()" style="padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer"><span>📁</span> Pasta</div>
  </div>
</div>

<footer><button>✕ Cancelar</button><button>✓ Selecionar</button></footer>

<div class="modal" id="privacyModal">
  <div class="modal-box">
    <div style="display:flex;gap:12px"><div style="font-size:28px">⚠️</div><div><h3>Não é possível usar essa pasta</h3><p style="color:#bbb;font-size:14px">Para proteger sua privacidade, escolha outra pasta</p></div></div>
    <button class="btn-blue" onclick="closeModal()">CRIAR NOVA PASTA</button>
  </div>
</div>

<div class="modal" id="createModal" style="background:rgba(0,0,0,.5)">
  <div style="background:#fff;color:#000;border-radius:16px;padding:20px;max-width:340px;width:90%;box-shadow:0 8px 24px rgba(0,0,0,.3)">
    <h3 id="createTitle" style="margin:0 0 16px;font-size:20px;font-weight:500">Criar pasta</h3>
    <input id="createInput" style="width:100%;padding:12px;border:2px solid #009688;border-radius:4px;font-size:16px;outline:none" placeholder="">
    <div style="text-align:right;margin-top:20px">
      <button onclick="closeCreate()" style="background:none;border:none;color:#009688;font-size:15px;padding:8px 16px">Cancelar</button>
      <button onclick="confirmCreate()" style="background:none;border:none;color:#009688;font-size:15px;padding:8px 16px;font-weight:500">OK</button>
    </div>
  </div>
</div>

<script>
const catsData=[
 {id:'downloads',name:'Downloads',icon:'⬇️',color:'#ff9800'},
 {id:'images',name:'Imagens',icon:'🖼️',color:'#9c27b0'},
 {id:'audio',name:'Áudio',icon:'🎵',color:'#4caf50'},
 {id:'videos',name:'Vídeos',icon:'🎬',color:'#e53935'},
 {id:'docs',name:'Documentos',icon:'📄',color:'#1e88e5'},
 {id:'apps',name:'Aplicativos',icon:'🔒',color:'#4caf50'},
 {id:'recent',name:'Recentes',icon:'🕒',color:'#039be5'},
 {id:'cloud',name:'Nuvem',icon:'☁️',color:'#2196f3'},
 {id:'remote',name:'Remoto',icon:'🖥️',color:'#795548'},
 {id:'access',name:'Acesso',icon:'📁',color:'#607d8b'},
 {id:'zip',name:'Compactados',icon:'🗜️',color:'#ff9800'},
 {id:'others',name:'Outros',icon:'📄',color:'#616161'},
 {id:'all',name:'Todos',icon:'⊞',color:'#0097a7'},
 {id:'trash',name:'Lixeira',icon:'🗑️',color:'#9e9e9e'},
];
const catsEl=document.getElementById('cats');
catsData.forEach((c,i)=>{
  const d=document.createElement('div');
  d.className='cat'+(i===2?' active':'');
  d.innerHTML=`<div class="cat-icon" style="background:${c.color}">${c.icon}</div><b>${c.name}</b><span id="c-${c.id}">0 itens</span>`;
  catsEl.appendChild(d);
});

let handles={internal:null,sd:null};
let data={internal:{counts:{},folders:[]},sd:{counts:{},folders:[]}};
let currentType=null;
let createMode='folder';

async function pick(type){
  try{
    if(!window.showDirectoryPicker){alert('Seu navegador não suporta acesso a arquivos. Use Chrome no Android.');return}
    const handle=await window.showDirectoryPicker({mode:'readwrite'});
    handles[type]=handle;
    document.getElementById(type==='internal'?'int-sub':'sd-sub').textContent='Indexando...';
    await index(type,handle);
  }catch(e){
    if(e.name==='AbortError')return;
    console.error(e);
    document.getElementById('privacyModal').style.display='flex';
  }
}
document.getElementById('internal').onclick=()=>pick('internal');
document.getElementById('sd').onclick=()=>pick('sd');

function categorize(name,counts){
  const ext=name.split('.').pop().toLowerCase();
  counts.total=(counts.total||0)+1;
  if(['jpg','jpeg','png','gif','webp','bmp','heic'].includes(ext)){counts.images=(counts.images||0)+1}
  else if(['mp3','wav','m4a','ogg','flac','aac'].includes(ext)){counts.audio=(counts.audio||0)+1}
  else if(['mp4','mkv','avi','mov','webm','3gp'].includes(ext)){counts.videos=(counts.videos||0)+1}
  else if(['pdf','doc','docx','xls','xlsx','ppt','pptx','txt'].includes(ext)){counts.docs=(counts.docs||0)+1}
  else if(['zip','rar','7z','tar','gz'].includes(ext)){counts.zip=(counts.zip||0)+1}
  else if(['apk'].includes(ext)){counts.apps=(counts.apps||0)+1}
  else {counts.others=(counts.others||0)+1}
}

async function index(type,handle){
  const counts={}; const folders=[];
  let scanned=0;
  for await(const entry of handle.values()){
    scanned++;
    if(entry.kind==='file'){categorize(entry.name,counts)}
    else{
      let items=0; try{for await(const _ of entry.values()){items++; if(items>99)break}}catch{}
      const date=new Date();
      folders.push({name:entry.name,items,date})
    }
    if(scanned>200)break; // limita para não travar
  }
  data[type]={counts,folders};
  updateHome(type,counts);
  // barra
  const bar=document.getElementById(type==='internal'?'int-bar':'sd-bar');
  bar.style.width='70%';
  document.getElementById(type==='internal'?'int-sub':'sd-sub').textContent=counts.total?`${counts.total} itens indexados`:'Toque para abrir';
}

function updateHome(type,counts){
  document.getElementById('c-images').textContent=(counts.images||0)+' itens';
  document.getElementById('c-audio').textContent=(counts.audio||0)+' itens';
  document.getElementById('c-videos').textContent=(counts.videos||0)+' itens';
  document.getElementById('c-docs').textContent=(counts.docs||0)+' itens';
  document.getElementById('c-zip').textContent=(counts.zip||0)+' itens';
  document.getElementById('c-apps').textContent=(counts.apps||0)+' itens';
  document.getElementById('c-others').textContent=(counts.others||0)+' itens';
  document.getElementById('c-all').textContent=(counts.total||0)+' itens';
  document.getElementById('c-downloads').textContent=(counts.total||0)+' itens';
}

document.getElementById('internal').ondblclick=()=>openList('internal');
document.getElementById('sd').ondblclick=()=>openList('sd');
document.getElementById('internal').addEventListener('click',()=>{if(handles.internal)openList('internal')});
document.getElementById('sd').addEventListener('click',()=>{if(handles.sd)openList('sd')});

async function openList(type){
  if(!handles[type])return pick(type);
  currentType=type;
  document.getElementById('home').style.display='none';
  document.getElementById('listView').style.display='flex';
  document.getElementById('listTitle').textContent=type==='sd'?'Cartão SD':'Armazenamento interno';
  const list=document.getElementById('folderList');
  list.innerHTML='';
  const folders=data[type].folders||[];
  folders.sort((a,b)=>a.name.localeCompare(b.name));
  folders.forEach(f=>{
    const div=document.createElement('div');div.className='folder';
    const dateStr=f.date.toLocaleDateString('pt-BR',{day:'numeric',month:'short',year:'numeric'});
    div.innerHTML=`<div class="folder-icon">📁</div><div class="folder-info"><b>${f.name}</b><small>${f.items} itens</small></div><div class="folder-date">${dateStr}</div>`;
    list.appendChild(div);
  });
  // uso
  if(type==='internal' && navigator.storage?.estimate){
    const est=await navigator.storage.estimate();
    const pct=Math.round((est.usage/est.quota)*100);
    document.getElementById('usageBox').textContent=`● ${pct}% EM USO`;
  }else{
    document.getElementById('usageBox').textContent='● 85% EM USO';
  }
}
function closeList(){document.getElementById('listView').style.display='none';document.getElementById('home').style.display='block'}
function closeModal(){document.getElementById('privacyModal').style.display='none'}

document.getElementById('search').oninput=e=>{
  const q=e.target.value.toLowerCase();
  document.querySelectorAll('.folder').forEach(f=>{f.style.display=f.textContent.toLowerCase().includes(q)?'flex':'none'})
};

function toggleMenu(){
  const m=document.getElementById('mainMenu');
  m.style.display=m.style.display==='none'?'block':'none';
  document.getElementById('newMenu').style.display='none';
}
function openNewMenu(){
  document.getElementById('newMenu').style.display='block';
}
function closeMenus(){document.getElementById('mainMenu').style.display='none';document.getElementById('newMenu').style.display='none'}
document.addEventListener('click',e=>{if(!e.target.closest('#mainMenu') && !e.target.closest('.list-header'))closeMenus()});

function createFolderPrompt(){
  createMode='folder';
  document.getElementById('createTitle').textContent='Criar pasta';
  document.getElementById('createInput').value='';
  document.getElementById('createModal').style.display='flex';
  closeMenus();
  setTimeout(()=>document.getElementById('createInput').focus(),100);
}
function createFilePrompt(){
  createMode='file';
  document.getElementById('createTitle').textContent='Criar arquivo';
  document.getElementById('createInput').value='';
  document.getElementById('createModal').style.display='flex';
  closeMenus();
  setTimeout(()=>document.getElementById('createInput').focus(),100);
}
function closeCreate(){document.getElementById('createModal').style.display='none'}

async function confirmCreate(){
  const name=document.getElementById('createInput').value.trim();
  if(!name || !currentType || !handles[currentType])return closeCreate();
  try{
    const handle=handles[currentType];
    if(createMode==='folder'){
      await handle.getDirectoryHandle(name,{create:true});
    }else{
      await handle.getFileHandle(name,{create:true});
    }
    closeCreate();
    await index(currentType,handle);
    await openList(currentType);
  }catch(err){
    alert('Não foi possível criar: '+err.message);
  }
}
async function refreshCurrent(){
  if(currentType && handles[currentType]){
    await index(currentType,handles[currentType]);
    await openList(currentType);
  }
  closeMenus();
}
function analyzeStorage(){
  alert('Análise: '+ (data[currentType]?.folders?.length||0) +' pastas indexadas');
  closeMenus();
}
</script>
<script>(function(){var loc=location.href.replace(/#.*$/,"");var ATTR_NAMES=["data-product-id","data-productid","data-product_id","product-id","productid","product_id","data-source-entity-id","source-entity-id","source_entity_id","data-product","data-metadata","data-meta"];var DATASET_KEYS=["productId","productid","product_id","sourceEntityId","sourceentityid","source_entity_id","product","metadata","meta"];function readProductId(value){if(typeof value!=="string"||value.length===0)return null;if(/^[0-9]{6,}$/.test(value))return value;var match=value.match(/(?:product(?:_|-)?id|source(?:_|-)?entity(?:_|-)?id)["'=:\s]+([0-9]{6,})/i);return match?match[1]:null}function extractProductId(start){for(var node=start;node&&node!==document.body;node=node.parentElement){for(var i=0;i<ATTR_NAMES.length;i++){var attrValue=node.getAttribute&&node.getAttribute(ATTR_NAMES[i]);var attrProductId=readProductId(attrValue);if(attrProductId)return attrProductId}var dataset=node.dataset||null;if(dataset){for(var j=0;j<DATASET_KEYS.length;j++){var dataValue=dataset[DATASET_KEYS[j]];var dataProductId=readProductId(dataValue);if(dataProductId)return dataProductId}}}return null}document.addEventListener("click",function(e){var target=e.target instanceof Element?e.target:null;if(!target)return;var a=target.closest?target.closest("a[href]"):null;if(!a||!a.href||!/^https?:\/\//.test(a.href))return;if(a.href.replace(/#.*$/,"")===loc)return;var productId=extractProductId(target)||extractProductId(a);if(!productId)return;e.preventDefault();parent.postMessage({type:"ecto-artifact-link-click",productId:productId},"*")},true)})();</script></body>
</html>
